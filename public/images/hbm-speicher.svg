<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-label="Gestochene Illustration: gestapelter Hochleistungsspeicher auf einer Platine">
  <defs>
    <pattern id="hatch" width="7" height="7" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="7" stroke="#111111" stroke-width="1" opacity="0.28"/>
    </pattern>
    <pattern id="hatch2" width="5" height="5" patternTransform="rotate(-45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="5" stroke="#111111" stroke-width="0.8" opacity="0.18"/>
    </pattern>
  </defs>
  <rect width="1200" height="560" fill="#f4efe6"/>
  <rect x="14" y="14" width="1172" height="532" fill="none" stroke="#111111" stroke-width="2.5"/>
  <rect x="22" y="22" width="1156" height="516" fill="none" stroke="#111111" stroke-width="0.8"/>

  <!-- Platine mit Leiterbahnen -->
  <g stroke="#111111" stroke-width="1.4" fill="none" opacity="0.85">
    <path d="M120 420 H360 V330 H480"/>
    <path d="M120 460 H400 V360 H480"/>
    <path d="M1080 420 H840 V330 H720"/>
    <path d="M1080 460 H800 V360 H720"/>
    <path d="M300 120 V200 H480"/>
    <path d="M900 120 V200 H720"/>
    <path d="M180 250 H480"/>
    <path d="M1020 250 H720"/>
  </g>
  <g fill="#f4efe6" stroke="#111111" stroke-width="1.4">
    <circle cx="120" cy="420" r="7"/><circle cx="120" cy="460" r="7"/>
    <circle cx="1080" cy="420" r="7"/><circle cx="1080" cy="460" r="7"/>
    <circle cx="300" cy="120" r="7"/><circle cx="900" cy="120" r="7"/>
    <circle cx="180" cy="250" r="7"/><circle cx="1020" cy="250" r="7"/>
  </g>

  <!-- Speicherstapel (isometrisch angedeutet) -->
  <g stroke="#111111" stroke-width="2" fill="#f4efe6">
    <rect x="480" y="352" width="240" height="36"/>
    <rect x="492" y="316" width="216" height="36"/>
    <rect x="504" y="280" width="192" height="36"/>
    <rect x="516" y="244" width="168" height="36"/>
    <rect x="528" y="208" width="144" height="36"/>
  </g>
  <g fill="url(#hatch)" stroke="none">
    <rect x="480" y="352" width="240" height="36"/>
    <rect x="504" y="280" width="192" height="36"/>
    <rect x="528" y="208" width="144" height="36"/>
  </g>
  <g fill="url(#hatch2)" stroke="none">
    <rect x="492" y="316" width="216" height="36"/>
    <rect x="516" y="244" width="168" height="36"/>
  </g>
  <!-- Durchkontaktierungen -->
  <g stroke="#111111" stroke-width="1.1">
    <line x1="560" y1="208" x2="560" y2="388"/>
    <line x1="600" y1="208" x2="600" y2="388"/>
    <line x1="640" y1="208" x2="640" y2="388"/>
  </g>
  <!-- Krone: Datenstrahlen -->
  <g stroke="#111111" stroke-width="1.3" fill="none">
    <path d="M600 190 V150"/>
    <path d="M556 196 L522 158"/>
    <path d="M644 196 L678 158"/>
  </g>

  <!-- Schriftzeile der Tafel -->
  <g font-family="Georgia, 'Times New Roman', serif" fill="#111111" text-anchor="middle">
    <text x="600" y="490" font-size="26" letter-spacing="6" style="text-transform:uppercase">HIGH BANDWIDTH MEMORY</text>
    <text x="600" y="516" font-size="15" font-style="italic" opacity="0.7">Gestapelter Hochleistungsspeicher, Tafel I · The Capital Compass</text>
  </g>
  <line x1="440" y1="464" x2="760" y2="464" stroke="#111111" stroke-width="1"/>
  <line x1="490" y1="468" x2="710" y2="468" stroke="#111111" stroke-width="0.6"/>
</svg>
