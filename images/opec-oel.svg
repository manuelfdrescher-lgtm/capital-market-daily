<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-label="Gestochene Illustration: Bohrturm und Ölfässer am Horizont">
  <defs>
    <pattern id="oel-hatch" width="7" height="7" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="7" stroke="#111111" stroke-width="1" opacity="0.26"/>
    </pattern>
  </defs>
  <rect width="1200" height="560" fill="#f4efe6"/>
  <rect x="14" y="14" width="1172" height="532" fill="none" stroke="#111111" stroke-width="2.5"/>
  <rect x="22" y="22" width="1156" height="516" fill="none" stroke="#111111" stroke-width="0.8"/>

  <!-- Horizont -->
  <line x1="80" y1="400" x2="1120" y2="400" stroke="#111111" stroke-width="1.6"/>
  <g stroke="#111111" stroke-width="0.7" opacity="0.5">
    <line x1="120" y1="412" x2="520" y2="412"/>
    <line x1="700" y1="412" x2="1080" y2="412"/>
    <line x1="200" y1="424" x2="460" y2="424"/>
  </g>

  <!-- Bohrturm (Fachwerk) -->
  <g stroke="#111111" stroke-width="2.2" fill="none">
    <path d="M430 400 L490 130 L550 400"/>
    <path d="M448 330 H532"/>
    <path d="M458 270 H522"/>
    <path d="M468 215 H512"/>
    <path d="M477 170 H503"/>
  </g>
  <g stroke="#111111" stroke-width="1.1" fill="none">
    <path d="M448 330 L522 270 M532 330 L458 270"/>
    <path d="M458 270 L512 215 M522 270 L468 215"/>
    <path d="M468 215 L503 170 M512 215 L477 170"/>
  </g>
  <rect x="478" y="112" width="24" height="18" fill="#f4efe6" stroke="#111111" stroke-width="1.6"/>
  <line x1="490" y1="130" x2="490" y2="400" stroke="#111111" stroke-width="1"/>

  <!-- Pumpe rechts -->
  <g stroke="#111111" stroke-width="2" fill="none">
    <path d="M780 400 L820 320 L860 400"/>
    <line x1="756" y1="316" x2="884" y2="308"/>
    <path d="M884 308 Q906 308 902 330 L896 352"/>
    <line x1="756" y1="316" x2="748" y2="352"/>
    <circle cx="748" cy="368" r="16"/>
  </g>

  <!-- Fässer -->
  <g stroke="#111111" stroke-width="1.8">
    <g>
      <rect x="180" y="330" width="64" height="70" rx="6" fill="url(#oel-hatch)"/>
      <rect x="180" y="330" width="64" height="70" rx="6" fill="none"/>
      <line x1="180" y1="352" x2="244" y2="352"/>
      <line x1="180" y1="378" x2="244" y2="378"/>
    </g>
    <g>
      <rect x="256" y="344" width="56" height="56" rx="5" fill="#f4efe6"/>
      <line x1="256" y1="362" x2="312" y2="362"/>
      <line x1="256" y1="382" x2="312" y2="382"/>
    </g>
  </g>

  <g font-family="Georgia, 'Times New Roman', serif" fill="#111111" text-anchor="middle">
    <text x="600" y="490" font-size="26" letter-spacing="6">ANGEBOT UND ERWARTUNG</text>
    <text x="600" y="516" font-size="15" font-style="italic" opacity="0.7">Das Ölkartell und der Preis, Tafel II · The Capital Compass</text>
  </g>
  <line x1="440" y1="464" x2="760" y2="464" stroke="#111111" stroke-width="1"/>
  <line x1="490" y1="468" x2="710" y2="468" stroke="#111111" stroke-width="0.6"/>
</svg>
