<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-label="Gestochene Illustration: Reichstagsgebäude mit Kuppel">
  <defs>
    <pattern id="rt-hatch" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#111111" stroke-width="0.9" opacity="0.22"/>
    </pattern>
  </defs>
  <rect width="1200" height="560" fill="#f4efe6"/>
  <rect x="14" y="14" width="1172" height="532" fill="none" stroke="#111111" stroke-width="2.5"/>
  <rect x="22" y="22" width="1156" height="516" fill="none" stroke="#111111" stroke-width="0.8"/>

  <!-- Kuppel -->
  <g stroke="#111111" fill="none">
    <path d="M600 96 C 668 96 712 148 712 206 L488 206 C488 148 532 96 600 96 Z" stroke-width="2.2"/>
    <path d="M600 96 C 640 96 664 148 664 206 M600 96 C 560 96 536 148 536 206 M600 96 V206" stroke-width="1"/>
    <path d="M512 150 H688 M496 178 H704" stroke-width="0.9"/>
    <line x1="600" y1="96" x2="600" y2="72" stroke-width="2"/>
    <circle cx="600" cy="66" r="6" stroke-width="1.6"/>
  </g>

  <!-- Gebälk mit Inschrift -->
  <g stroke="#111111">
    <rect x="380" y="206" width="440" height="14" fill="#f4efe6" stroke-width="1.8"/>
    <rect x="360" y="220" width="480" height="34" fill="#f4efe6" stroke-width="2"/>
  </g>
  <text x="600" y="244" font-family="Georgia, serif" font-size="19" letter-spacing="5" text-anchor="middle" fill="#111111">DEM DEUTSCHEN VOLKE</text>

  <!-- Giebel -->
  <path d="M360 220 L600 150 L840 220" fill="none" stroke="#111111" stroke-width="0" opacity="0"/>

  <!-- Säulen -->
  <g stroke="#111111" stroke-width="1.8" fill="#f4efe6">
    <rect x="380" y="254" width="26" height="150"/>
    <rect x="452" y="254" width="26" height="150"/>
    <rect x="524" y="254" width="26" height="150"/>
    <rect x="650" y="254" width="26" height="150"/>
    <rect x="722" y="254" width="26" height="150"/>
    <rect x="794" y="254" width="26" height="150"/>
  </g>
  <g stroke="#111111" stroke-width="0.7" opacity="0.6">
    <line x1="389" y1="258" x2="389" y2="400"/><line x1="397" y1="258" x2="397" y2="400"/>
    <line x1="461" y1="258" x2="461" y2="400"/><line x1="469" y1="258" x2="469" y2="400"/>
    <line x1="533" y1="258" x2="533" y2="400"/><line x1="541" y1="258" x2="541" y2="400"/>
    <line x1="659" y1="258" x2="659" y2="400"/><line x1="667" y1="258" x2="667" y2="400"/>
    <line x1="731" y1="258" x2="731" y2="400"/><line x1="739" y1="258" x2="739" y2="400"/>
    <line x1="803" y1="258" x2="803" y2="400"/><line x1="811" y1="258" x2="811" y2="400"/>
  </g>

  <!-- Portal -->
  <rect x="576" y="290" width="48" height="114" fill="url(#rt-hatch)" stroke="#111111" stroke-width="1.6"/>

  <!-- Seitenflügel -->
  <g stroke="#111111" stroke-width="1.8" fill="#f4efe6">
    <rect x="180" y="280" width="180" height="124"/>
    <rect x="840" y="280" width="180" height="124"/>
  </g>
  <g fill="url(#rt-hatch)" stroke="#111111" stroke-width="1">
    <rect x="206" y="304" width="30" height="44"/><rect x="256" y="304" width="30" height="44"/><rect x="306" y="304" width="30" height="44"/>
    <rect x="866" y="304" width="30" height="44"/><rect x="916" y="304" width="30" height="44"/><rect x="966" y="304" width="30" height="44"/>
  </g>

  <!-- Sockel -->
  <rect x="160" y="404" width="880" height="12" fill="#f4efe6" stroke="#111111" stroke-width="1.8"/>
  <line x1="120" y1="428" x2="1080" y2="428" stroke="#111111" stroke-width="1"/>

  <g font-family="Georgia, 'Times New Roman', serif" fill="#111111" text-anchor="middle">
    <text x="600" y="490" font-size="26" letter-spacing="6">HAUSHALT UND STANDORT</text>
    <text x="600" y="516" font-size="15" font-style="italic" opacity="0.7">Politik und Kapitalmarkt, Tafel III · The Capital Compass</text>
  </g>
  <line x1="440" y1="464" x2="760" y2="464" stroke="#111111" stroke-width="1"/>
  <line x1="490" y1="468" x2="710" y2="468" stroke="#111111" stroke-width="0.6"/>
</svg>
